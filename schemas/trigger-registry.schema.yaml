schema_id: kiu.trigger-registry/v0.3
title: KiU Trigger Registry
type: object
required:
  - triggers
properties:
  triggers:
    type: array
    items:
      type: object
      required:
        - symbol
        - definition
        - positive_examples
        - negative_examples
      properties:
        symbol:
          type: string
        definition:
          type: string
        positive_examples:
          type: array
          minItems: 1
          items:
            type: string
        negative_examples:
          type: array
          minItems: 1
          items:
            type: string
        matching_hints:
          type: object
